    <style>
        /* 文青風自定義滾動條：更細緻、顏色更融合 */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #d6d3cd; /* 暖灰色 */
            border-radius: 20px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #b8b5af;
        }
        
        /* 讓輸入框 focus 時的框線更柔和 */
        .focus-ring {
            transition: all 0.3s ease;
        }
        .focus-ring:focus-within {
            box-shadow: 0 0 0 2px rgba(168, 162, 158, 0.3); /* 石灰色光暈 */
        }
        
        /* 選擇文字的顏色改為文青綠 */
        ::selection {
            background: #dbece5;
            color: #1c1917;
        }

        /* 讀取中動畫 */
        @keyframes pulse-slow {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .animate-pulse-slow {
            animation: pulse-slow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>

            "台灣檢驗科技股份有限公司", "富比士網路科技有限公司", "恆酉有限公司", "大禾行銷整合有限公司", "優朋國際股份有限公司", 
            "僑馥建築經理股份有限公司", "宏亞食品股份有限公司", "黃宇靖", "阮妙碖", "兆勝管理顧問有限公司", "大來禮品贈品有限公司",

            "弘龍木地板工程有限公司", "恆固建材有限公司"
        ];

        let companies = [];
        let isFirstLoad = true;

        // 監聽雲端資料變化 (Realtime Updates)
        const unsubscribe = onSnapshot(docRef, (docSnap) => {
            const loadingMask = document.getElementById('loadingMask');
            const connectionStatus = document.getElementById('connectionStatus');
            
            if (docSnap.exists()) {
                const data = docSnap.data();
                // 確保資料是陣列
                companies = data.names || [];
            } else {
                // 如果檔案不存在 (第一次使用)，companies 設為空
                companies = [];
            }

            // 更新 UI 狀態
            if (isFirstLoad) {
                loadingMask.classList.add('hidden'); // 隱藏遮罩
                isFirstLoad = false;
            }
            
            connectionStatus.classList.remove('bg-gray-300', 'bg-red-400');
            connectionStatus.classList.add('bg-[#6b857a]'); // 綠燈：連線正常
            
            renderList();
        }, (error) => {
            console.error("雲端連線失敗:", error);
            document.getElementById('connectionStatus').classList.add('bg-red-400');
        });

        // 顯示儲存成功的小提示
        function showSaveIndicator() {
            const indicator = document.getElementById('saveIndicator');
            indicator.classList.remove('opacity-0');
            setTimeout(() => {
                indicator.classList.add('opacity-0');
            }, 2000);
        }

        // 渲染清單 (掛載到 window 以便 HTML 呼叫)
        window.renderList = function() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const listContainer = document.getElementById('listContainer');
            const clearSearchBtn = document.getElementById('clearSearchBtn');
            const countDisplay = document.getElementById('countDisplay');

            // 顯示/隱藏清除搜尋按鈕
            clearSearchBtn.classList.toggle('hidden', searchTerm === '');

            // 過濾資料
            const filtered = companies.filter(name => name.toLowerCase().includes(searchTerm));
            countDisplay.innerText = filtered.length;

            if (filtered.length === 0) {
                // 檢查是否因為還沒資料
                if (companies.length === 0 && searchTerm === '') {
                    listContainer.innerHTML = `
                        <div class="py-16 text-center select-none">
                            <div class="inline-block p-4 rounded-full bg-[#f5f2eb] mb-3">
                                <i data-lucide="cloud-off" class="w-8 h-8 text-[#d6d3cd]"></i>
                            </div>
                            <p class="text-[#a8a29e] tracking-wider text-sm font-medium">雲端暫無資料</p>
                            <p class="text-[#a8a29e] text-xs mt-2 cursor-pointer hover:text-[#9f5d5d]" onclick="handleReset()">點擊「重設」匯入預設清單</p>
                        </div>
                    `;
                } else {
                    listContainer.innerHTML = `
                        <div class="py-16 text-center select-none">
                            <div class="inline-block p-4 rounded-full bg-[#f5f2eb] mb-3">
                                <i data-lucide="coffee" class="w-8 h-8 text-[#d6d3cd]"></i>
                            </div>
                            <p class="text-[#a8a29e] tracking-wider text-sm font-medium">找不到相關紀錄。</p>
                        </div>
                    `;
                }
            } else {
                let html = '<ul class="divide-y divide-[#f0ece9]">';
                filtered.forEach((name, index) => {
                    html += `
                        <li class="group flex justify-between items-center px-5 py-4 hover:bg-[#f5f2eb]/50 transition-all duration-300">
                            <span class="text-[#292524] group-hover:text-black transition-colors flex-1 pr-4 text-sm md:text-base tracking-wide font-medium">
                                ${name}
                            </span>
                            <div class="flex items-center gap-2 opacity-40 group-hover:opacity-100 transition-all duration-300">
                                <button 
                                    onclick="handleCopy('${name}', this)"
                                    class="copy-btn flex items-center gap-1.5 px-3 py-1.5 rounded-xl transition-all text-xs font-medium bg-white border border-[#e7e5e4] text-[#78716c] hover:border-[#aabfb6] hover:text-[#5c7a6e] hover:shadow-sm"
                                    title="複製"
                                >
                                    <i data-lucide="copy" class="w-3.5 h-3.5"></i>
                                    <span class="hidden sm:inline">複製</span>
                                </button>
                                <button 
                                    onclick="handleDelete('${name}')"
                                    class="p-2 text-[#d6d3cd] hover:text-[#b45f5f] hover:bg-[#fef2f2] rounded-xl transition-all"
                                    title="刪除"
                                >
                                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </li>
                    `;
                });
                html += '</ul>';
                listContainer.innerHTML = html;
            }
            lucide.createIcons();
        }

        window.clearSearch = function() {
            document.getElementById('searchInput').value = '';
            renderList();
        }

        window.handleCopy = function(text, btnElement) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                // 視覺反饋
                const originalContent = btnElement.innerHTML;
                const originalClass = btnElement.className;
                
                btnElement.className = "flex items-center gap-1.5 px-3 py-1.5 rounded-xl transition-all text-xs font-medium bg-[#edf7f2] border border-[#aabfb6] text-[#5c7a6e]";
                btnElement.innerHTML = `<i data-lucide="check" class="w-3.5 h-3.5"></i><span class="hidden sm:inline">已複製</span>`;
                lucide.createIcons();

                setTimeout(() => {
                    btnElement.innerHTML = originalContent;
                    btnElement.className = originalClass;
                    lucide.createIcons();
                }, 2000);
            } catch (err) {
                console.error('複製失敗', err);
            }
            document.body.removeChild(textArea);
        }

        // 新增功能 (寫入 Firebase)
        window.handleAdd = async function() {
            const input = document.getElementById('newNameInput');
            const btn = document.getElementById('addBtn');
            const name = input.value.trim();
            
            if (!name) return;
            if (companies.includes(name)) {
                alert('此名稱已存在紀錄中');
                return;
            }

            // UI 鎖定
            input.disabled = true;
            btn.disabled = true;

            try {
                // 為了保持「最新在最上面」，我們需要操作完整陣列
                const newFullList = [name, ...companies];
                
                // 寫入整筆陣列到雲端
                await setDoc(docRef, { names: newFullList }, { merge: true });
                
                input.value = '';
                showSaveIndicator();
            } catch (error) {
                console.error("新增失敗: ", error);
                alert("連線錯誤，無法儲存至雲端。");
            } finally {
                input.disabled = false;
                btn.disabled = false;
                input.focus();
            }
        }

        // 刪除功能 (寫入 Firebase)
        window.handleDelete = async function(name) {
            if (confirm(`確定要從雲端刪除「${name}」嗎？此動作將同步至所有裝置。`)) {
                try {
                    // 使用 arrayRemove 移除特定項目
                    await updateDoc(docRef, {
                        names: arrayRemove(name)
                    });
                    showSaveIndicator();
                } catch (error) {
                    console.error("刪除失敗: ", error);
                    alert("刪除失敗，請檢查網路連線。");
                }
            }
        }

        // 重設功能 (覆蓋 Firebase)
        window.handleReset = async function() {
            if (confirm('確定要「重設」雲端資料庫嗎？\n\n這將會：\n1. 清除所有您手動新增的紀錄。\n2. 重新匯入系統預設的數百筆原始資料。\n3. 所有共用此網頁的人都會被重設。')) {
                const loadingMask = document.getElementById('loadingMask');
                loadingMask.classList.remove('hidden'); // 顯示讀取中
                
                try {
                    await setDoc(docRef, { names: initialData });
                    showSaveIndicator();
                } catch (error) {
                    console.error("重設失敗: ", error);
                    alert("重設失敗，請檢查網路連線。");
                } finally {
                    loadingMask.classList.add('hidden');
                }
            }
        }

        // 新增：匯出 Excel 功能
        window.handleExport = function() {
            if (companies.length === 0) {
                alert("目前雲端暫無資料可供匯出。");
                return;
            }

            try {
                // 格式化資料為 Excel 要求的二維陣列
                const data = companies.map(name => [name]);
                // 加入標題列
                data.unshift(["廠商名稱"]);

                // 建立工作表
                const ws = XLSX.utils.aoa_to_sheet(data);
                // 建立活頁簿
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "廠商清單");

                // 下載 Excel 檔
                const timestamp = new Date().toISOString().split('T')[0];
                XLSX.writeFile(wb, `廠商名稱清單_${timestamp}.xlsx`);
            } catch (error) {
                console.error("匯出失敗: ", error);
                alert("匯出 Excel 失敗，請稍後再試。");
            }
        }
        
        // 初始 Icon 渲染 (避免載入時閃爍)
        lucide.createIcons();
    </script>
