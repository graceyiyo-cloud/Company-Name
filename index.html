<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企業名稱管理系統</title>
    <!-- 使用 Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 使用 Lucide 圖標庫 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* 文青風自定義滾動條：更細緻、顏色更融合 */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #d6d3cd; /* 暖灰色 */
            border-radius: 20px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #b8b5af;
        }
        
        /* 讓輸入框 focus 時的框線更柔和 */
        .focus-ring {
            transition: all 0.3s ease;
        }
        .focus-ring:focus-within {
            box-shadow: 0 0 0 2px rgba(168, 162, 158, 0.3); /* 石灰色光暈 */
        }
        
        /* 選擇文字的顏色改為文青綠 */
        ::selection {
            background: #dbece5;
            color: #1c1917;
        }
    </style>
</head>
<!-- 背景維持暖米色，文字顏色加深至近乎黑色的深褐色 (#292524) -->
<body class="min-h-screen bg-[#f5f2eb] p-6 font-sans text-[#292524]">
    
    <div class="max-w-md mx-auto">
        <!-- 標題與重置按鈕 -->
        <div class="flex justify-between items-end mb-8 px-2">
            <div>
                <!-- 標題加粗 font-bold，顏色加深 -->
                <h1 class="text-2xl font-bold tracking-widest text-[#1c1917] border-b-2 border-[#a8a29e] pb-1 inline-block">企業名稱</h1>
                <p class="text-xs text-[#78716c] mt-2 tracking-wide font-medium">蒐集與紀錄 · 靜謐管理</p>
            </div>
            <button 
                onclick="handleReset()"
                class="group flex items-center gap-1.5 text-xs text-[#78716c] hover:text-[#9f5d5d] transition-all duration-300 font-medium"
                title="重置回初始清單"
            >
                <div class="p-1 rounded-full border border-transparent group-hover:border-[#9f5d5d]/30 transition-all">
                    <i data-lucide="rotate-ccw" class="w-3.5 h-3.5"></i>
                </div>
                <span class="tracking-wider">重置</span>
            </button>
        </div>

        <!-- 搜尋欄位 -->
        <!-- 改為懸浮卡片式設計，陰影更柔和 -->
        <div class="mb-5 relative group">
            <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
                <!-- Icon 顏色加深 -->
                <i data-lucide="search" class="w-4 h-4 text-[#78716c] group-focus-within:text-[#57534e] transition-colors"></i>
            </div>
            <input
                type="text"
                id="searchInput"
                placeholder="搜尋名稱..."
                oninput="renderList()"
                onfocus="this.value=''; renderList()"
                class="w-full pl-11 pr-10 py-3.5 bg-[#fdfcfb] text-[#1c1917] font-medium rounded-2xl shadow-sm border-0 ring-1 ring-[#d6d3cd] focus:ring-2 focus:ring-[#78716c] placeholder-[#a8a29e] outline-none transition-all duration-300 text-sm tracking-wide"
            >
            <button 
                onclick="clearSearch()"
                id="clearSearchBtn"
                class="hidden absolute inset-y-0 right-3 flex items-center text-[#a8a29e] hover:text-[#57534e] transition-colors"
            >
                <i data-lucide="x" class="w-4 h-4"></i>
            </button>
        </div>

        <!-- 新增欄位 -->
        <div class="relative flex mb-8 group">
            <input
                type="text"
                id="newNameInput"
                placeholder="輸入欲新增的名稱..."
                class="w-full pl-5 pr-14 py-3.5 bg-[#fdfcfb] text-[#1c1917] font-medium rounded-2xl shadow-sm border-0 ring-1 ring-[#d6d3cd] focus:ring-2 focus:ring-[#8da399] placeholder-[#a8a29e] outline-none transition-all duration-300 text-sm tracking-wide"
                onkeypress="if(event.key === 'Enter') handleAdd()"
            >
            <!-- 按鈕顏色改為莫蘭迪綠 -->
            <button 
                onclick="handleAdd()"
                class="absolute right-2 top-2 bottom-2 aspect-square bg-[#8da399] text-white rounded-xl flex items-center justify-center hover:bg-[#6b857a] shadow-sm hover:shadow transition-all duration-300 transform active:scale-95"
                title="點擊新增"
            >
                <i data-lucide="plus" class="w-5 h-5"></i>
            </button>
        </div>

        <!-- 結果統計 -->
        <div class="flex justify-between items-center mb-3 px-3 text-xs tracking-wider">
            <span class="text-[#78716c] font-medium">
                共 <span id="countDisplay" class="text-[#44403c] font-bold mx-1">0</span> 筆紀錄
            </span>
            <div class="flex items-center gap-1.5 text-[#6b857a]">
                <i data-lucide="check-circle-2" class="w-3 h-3"></i>
                <span class="font-medium">已自動儲存</span>
            </div>
        </div>

        <!-- 清單顯示區域 -->
        <!-- 移除外框線，改用純背景色塊與內部陰影感 -->
        <div class="bg-[#fdfcfb] rounded-3xl shadow-[0_4px_20px_-4px_rgba(0,0,0,0.05)] overflow-hidden">
            <div id="listContainer" class="max-h-[60vh] overflow-y-auto custom-scrollbar p-2">
                <!-- 由 JavaScript 動態生成 -->
            </div>
        </div>

        <!-- 頁尾提示 -->
        <div class="mt-8 text-center">
            <p class="text-[#a8a29e] text-xs tracking-widest font-medium">
                COPY · DELETE · MANAGE
            </p>
        </div>
    </div>

        let companies = [];

        // 初始化
        window.onload = () => {
            const savedData = localStorage.getItem('company_db');
            if (savedData) {
                companies = JSON.parse(savedData);
            } else {
                companies = [...initialData];
            }
            renderList();
            lucide.createIcons();
        };

        // 儲存資料
        function saveData() {
            localStorage.setItem('company_db', JSON.stringify(companies));
        }

        // 渲染清單
        function renderList() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const listContainer = document.getElementById('listContainer');
            const clearSearchBtn = document.getElementById('clearSearchBtn');
            const countDisplay = document.getElementById('countDisplay');

            // 顯示/隱藏清除搜尋按鈕
            clearSearchBtn.classList.toggle('hidden', searchTerm === '');

            // 過濾資料
            const filtered = companies.filter(name => name.toLowerCase().includes(searchTerm));
            countDisplay.innerText = filtered.length;

            if (filtered.length === 0) {
                listContainer.innerHTML = `
                    <div class="py-16 text-center select-none">
                        <div class="inline-block p-4 rounded-full bg-[#f5f2eb] mb-3">
                            <i data-lucide="coffee" class="w-8 h-8 text-[#d6d3cd]"></i>
                        </div>
                        <p class="text-[#a8a29e] tracking-wider text-sm font-medium">一片空白，宛如初雪。</p>
                    </div>
                `;
            } else {
                let html = '<ul class="divide-y divide-[#f0ece9]">';
                filtered.forEach((name, index) => {
                    html += `
                        <li class="group flex justify-between items-center px-5 py-4 hover:bg-[#f5f2eb]/50 transition-all duration-300">
                            <!-- 字體從 font-light 改為 font-medium，顏色加深 -->
                            <span class="text-[#292524] group-hover:text-black transition-colors flex-1 pr-4 text-sm md:text-base tracking-wide font-medium">
                                ${name}
                            </span>
                            <div class="flex items-center gap-2 opacity-40 group-hover:opacity-100 transition-all duration-300">
                                <!-- 複製按鈕 -->
                                <button 
                                    onclick="handleCopy('${name}', this)"
                                    class="copy-btn flex items-center gap-1.5 px-3 py-1.5 rounded-xl transition-all text-xs font-medium bg-white border border-[#e7e5e4] text-[#78716c] hover:border-[#aabfb6] hover:text-[#5c7a6e] hover:shadow-sm"
                                    title="複製"
                                >
                                    <i data-lucide="copy" class="w-3.5 h-3.5"></i>
                                    <span class="hidden sm:inline">複製</span>
                                </button>
                                <!-- 刪除按鈕 -->
                                <button 
                                    onclick="handleDelete('${name}')"
                                    class="p-2 text-[#d6d3cd] hover:text-[#b45f5f] hover:bg-[#fef2f2] rounded-xl transition-all"
                                    title="刪除"
                                >
                                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </li>
                    `;
                });
                html += '</ul>';
                listContainer.innerHTML = html;
            }
            // 重新初始化圖標
            lucide.createIcons();
        }

        // 搜尋清除
        function clearSearch() {
            document.getElementById('searchInput').value = '';
            renderList();
        }

        // 複製功能
        function handleCopy(text, btnElement) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                
                // 視覺反饋
                const originalContent = btnElement.innerHTML;
                const originalClass = btnElement.className;
                
                // 改為文青綠的 Feedback 樣式
                btnElement.className = "flex items-center gap-1.5 px-3 py-1.5 rounded-xl transition-all text-xs font-medium bg-[#edf7f2] border border-[#aabfb6] text-[#5c7a6e]";
                btnElement.innerHTML = `<i data-lucide="check" class="w-3.5 h-3.5"></i><span class="hidden sm:inline">已複製</span>`;
                lucide.createIcons();

                setTimeout(() => {
                    btnElement.innerHTML = originalContent;
                    btnElement.className = originalClass;
                    lucide.createIcons();
                }, 2000);
            } catch (err) {
                console.error('複製失敗', err);
            }
            document.body.removeChild(textArea);
        }

        // 新增功能
        function handleAdd() {
            const input = document.getElementById('newNameInput');
            const name = input.value.trim();
            if (!name) return;
            if (companies.includes(name)) {
                alert('此名稱已存在紀錄中');
                return;
            }
            companies.unshift(name);
            input.value = '';
            saveData();
            renderList();
        }

        // 刪除功能
        function handleDelete(name) {
            if (confirm(`確定要刪除「${name}」嗎？`)) {
                companies = companies.filter(c => c !== name);
                saveData();
                renderList();
            }
        }

        // 重置功能
        function handleReset() {
            if (confirm('將重置回初始狀態，您手動新增的紀錄將會消失。')) {
                companies = [...initialData];
                saveData();
                renderList();
            }
        }
    </script>
